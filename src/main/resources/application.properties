spring.application.name=taskmanager

# H2 Database (file-based so data persists after restart)
spring.datasource.url=jdbc:h2:file:./data/taskdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=satyajeet_taskmanager_super_secret_key_256bit_long_enough_for_hs256
jwt.expiration=86400000

# Server
server.port=8080