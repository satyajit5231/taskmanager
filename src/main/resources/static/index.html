<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — by Satyajeet Sharma</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ═══════════════════════════════════════
     AUTH SCREEN
═══════════════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-box">

    <div class="auth-logo">
      <h1>✅ TaskFlow</h1>
      <p>Manage your tasks, effortlessly.</p>
    </div>

    <!-- Tab Switch -->
    <div class="tab-switch">
      <button class="tab-btn active"  onclick="switchTab('login', this)">Login</button>
      <button class="tab-btn"         onclick="switchTab('register', this)">Register</button>
      <button class="tab-btn"         onclick="switchTab('forgot', this)">Forgot Password</button>
    </div>

    <!-- Login Form -->
    <div id="login-form" class="step active">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="••••••••" />
      </div>
      <button class="btn-primary" onclick="login()">Login</button>
    </div>

    <!-- Register Form -->
    <div id="register-form" class="step">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="Satyajeet Sharma" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-pass" placeholder="••••••••" />
      </div>
      <div class="form-group">
        <label>Security Question</label>
        <select id="reg-question">
          <option value="">— Select a question —</option>
          <option value="What was the name of your first pet?">What was the name of your first pet?</option>
          <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
          <option value="What city were you born in?">What city were you born in?</option>
          <option value="What was the name of your first school?">What was the name of your first school?</option>
          <option value="What is your favourite childhood movie?">What is your favourite childhood movie?</option>
          <option value="What is your oldest sibling's middle name?">What is your oldest sibling's middle name?</option>
        </select>
      </div>
      <div class="form-group">
        <label>Your Answer</label>
        <input type="text" id="reg-answer" placeholder="Answer (case-insensitive)" />
      </div>
      <button class="btn-primary" onclick="register()">Create Account</button>
    </div>

    <!-- Forgot Password — Step 1 -->
    <div id="forgot-form" class="step">
      <div class="section-title">Forgot Password</div>
      <div class="section-sub">Enter your registered email to retrieve your security question.</div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="fp-email" placeholder="you@example.com" />
      </div>
      <button class="btn-primary" onclick="forgotStep1()">Continue →</button>
    </div>

    <!-- Forgot Password — Step 2 -->
    <div id="forgot-step2" class="step">
      <button class="back-btn" onclick="showForgotStep1()">← Back</button>
      <div class="section-title">Reset Password</div>
      <div class="section-sub">Answer your security question to set a new password.</div>
      <div class="question-display" id="question-display"></div>
      <div class="form-group">
        <label>Your Answer</label>
        <input type="text" id="fp-answer" placeholder="Your answer" />
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="fp-newpass" placeholder="New password" />
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="fp-confirmpass" placeholder="Confirm new password" />
      </div>
      <button class="btn-primary" onclick="forgotStep2()">Reset Password</button>
    </div>

    <div class="auth-error"   id="auth-error"></div>
    <div class="auth-success" id="auth-success"></div>

  </div>
</div>


<!-- ═══════════════════════════════════════
     APP SCREEN
═══════════════════════════════════════ -->
<div id="app-screen">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-brand">✅ TaskFlow</div>
    <div class="topbar-right">
      <span class="user-name" id="user-name-display"></span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">

    <!-- Stats Row -->
    <div class="stats-row">
      <div class="stat-card stat-total">
        <div class="label">Total</div>
        <div class="value" id="stat-total">0</div>
      </div>
      <div class="stat-card stat-pending">
        <div class="label">Pending</div>
        <div class="value" id="stat-pending">0</div>
      </div>
      <div class="stat-card stat-progress">
        <div class="label">In Progress</div>
        <div class="value" id="stat-progress">0</div>
      </div>
      <div class="stat-card stat-done">
        <div class="label">Completed</div>
        <div class="value" id="stat-done">0</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="filter-tabs">
        <button class="filter-btn active" onclick="filterTasks('ALL', this)">All</button>
        <button class="filter-btn"        onclick="filterTasks('PENDING', this)">Pending</button>
        <button class="filter-btn"        onclick="filterTasks('IN_PROGRESS', this)">In Progress</button>
        <button class="filter-btn"        onclick="filterTasks('COMPLETED', this)">Completed</button>
      </div>
      <button class="btn-add" onclick="openModal()">+ New Task</button>
    </div>

    <!-- Task Grid -->
    <div id="task-grid">
      <div class="loading">Loading tasks...</div>
    </div>

  </div>
</div>


<!-- ═══════════════════════════════════════
     ADD TASK MODAL
═══════════════════════════════════════ -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>New Task</h2>
    <div class="form-group">
      <label>Title *</label>
      <input type="text" id="task-title" placeholder="What needs to be done?" />
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="task-desc" placeholder="Add details (optional)..."></textarea>
    </div>
    <div class="form-group">
      <label>Priority</label>
      <select id="task-priority">
        <option value="LOW">🟢 Low</option>
        <option value="MEDIUM" selected>🟡 Medium</option>
        <option value="HIGH">🔴 High</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-submit" onclick="createTask()">Create Task</button>
    </div>
  </div>
</div>

<!-- JS Modules -->
<script type="module" src="js/app.js"></script>

</body>
</html>
